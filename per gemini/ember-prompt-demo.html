<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmberPrompt – Camelot-IDE Preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  min-height: 100dvh;
  background: #171614;
  color: #cdccca;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 20px;
  gap: 0;
}

/* Demo chat area */
.demo-chat {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 8px 0;
}

.bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.55;
  animation: bubbleIn 200ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.bubble.bot {
  background: #1c1b19;
  border: 1px solid #393836;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  color: #cdccca;
}

.bubble.user {
  background: #313b3b;
  border-bottom-right-radius: 4px;
  align-self: flex-end;
  color: #cdccca;
}

@keyframes bubbleIn {
  0% { opacity: 0; transform: translateY(8px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.ember-avatar {
  font-size: 16px;
  margin-bottom: 3px;
  display: block;
  color: #d163a7;
}

/* ── Ember Prompt styles (componente) ── */
.ember-prompt-wrapper {
  position: relative;
  padding: 6px 0 0;
  width: 100%;
  max-width: 560px;
}

.ember-live-text {
  min-height: 18px;
  padding: 0 14px 4px;
  font-size: 11px;
  color: #7a9ea8;
  letter-spacing: 0.02em;
  display: flex;
  flex-wrap: wrap;
  pointer-events: none;
  overflow: hidden;
  max-height: 40px;
}

.ember-char {
  display: inline-block;
  animation: charPop 120ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes charPop {
  0% { opacity: 0; transform: translateY(4px) scale(0.85); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.ember-cursor {
  display: inline-block;
  color: #4f98a3;
  animation: blink 900ms step-start infinite;
  font-weight: 100;
  margin-left: 1px;
  font-size: 13px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.ember-prompt-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: #1c1b19;
  border: 1px solid #393836;
  border-radius: 12px;
  padding: 8px 10px;
  transition: border-color 180ms ease, box-shadow 180ms ease;
}

.ember-prompt-wrapper.focused .ember-prompt-bar {
  border-color: #4f98a3;
  box-shadow: 0 0 0 2px rgba(79, 152, 163, 0.15);
}

.ember-prompt-wrapper.loading .ember-prompt-bar {
  border-color: #56444f;
  animation: pulseLoading 1.8s ease-in-out infinite;
}

@keyframes pulseLoading {
  0%, 100% { box-shadow: 0 0 0 0 rgba(209, 99, 167, 0); }
  50%       { box-shadow: 0 0 0 5px rgba(209, 99, 167, 0.1); }
}

.ember-status-dot {
  width: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-bottom: 3px;
}

.ember-dot-live {
  display: block;
  width: 7px;
  height: 7px;
  background: #4f98a3;
  border-radius: 50%;
  animation: pulseDot 2s ease-in-out infinite;
}

@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

.ember-thinking-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

.ember-thinking-dots span {
  display: block;
  width: 6px;
  height: 6px;
  background: #d163a7;
  border-radius: 50%;
  animation: dotBounce 1.1s ease-in-out infinite;
}

.ember-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.ember-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40%           { transform: translateY(-5px); opacity: 1; }
}

.ember-textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: inherit;
  font-size: 13.5px;
  line-height: 1.55;
  color: #cdccca;
  min-height: 24px;
  max-height: 140px;
  padding: 2px 0;
  overflow-y: auto;
}

.ember-textarea::placeholder { color: #5a5957; font-style: italic; }
.ember-textarea:disabled { opacity: 0.55; cursor: not-allowed; }

.ember-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  padding-bottom: 2px;
}

.ember-audio-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #5a5957;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: color 180ms ease, background 180ms ease;
}
.ember-audio-btn:hover { color: #cdccca; background: rgba(255,255,255,0.05); }
.ember-audio-btn.active { color: #4f98a3; }
.ember-audio-btn.active:hover { color: #8ec4cc; background: rgba(79,152,163,0.1); }

.ember-send-btn {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #4f98a3;
  border: none;
  cursor: pointer;
  color: #171614;
  transition: background 180ms ease, transform 80ms ease;
}
.ember-send-btn:hover:not(:disabled) { background: #227f8b; }
.ember-send-btn:active:not(:disabled) { transform: scale(0.93); }
.ember-send-btn:disabled { background: #2d2c2a; color: #5a5957; cursor: not-allowed; }

.ember-spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.ember-hint {
  padding: 5px 14px 0;
  font-size: 11px;
  color: #5a5957;
  display: flex;
  align-items: center;
  gap: 4px;
}
.ember-hint kbd {
  background: #262523;
  border: 1px solid #393836;
  border-radius: 4px;
  padding: 1px 5px;
  font-family: inherit;
  font-size: 10px;
  color: #797876;
}
.ember-audio-hint { color: #4f98a3; }

/* Audio status toast */
.audio-toast {
  position: fixed;
  top: 16px;
  right: 16px;
  background: #1c1b19;
  border: 1px solid #393836;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 12px;
  color: #cdccca;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 220ms ease, transform 220ms ease;
  pointer-events: none;
  z-index: 100;
}
.audio-toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Demo chat messages -->
<div class="demo-chat" id="chat">
  <div class="bubble bot">
    <span class="ember-avatar">🔥 Ember</span>
    Ciao! Sono Ember 👋 Come posso aiutarti oggi?
  </div>
</div>

<!-- Ember Prompt Component -->
<div class="ember-prompt-wrapper" id="promptWrapper">

  <!-- Live text visualizer -->
  <div class="ember-live-text" id="liveText" aria-live="polite"></div>

  <!-- Main bar -->
  <div class="ember-prompt-bar">
    <!-- Status indicator -->
    <div class="ember-status-dot" id="statusDot">
      <span class="ember-dot-live" id="dotLive"></span>
    </div>

    <!-- Textarea -->
    <textarea
      id="promptInput"
      class="ember-textarea"
      placeholder="Chiedi a Ember…"
      rows="1"
      aria-label="Messaggio per Ember"
    ></textarea>

    <!-- Controls -->
    <div class="ember-controls">
      <!-- Audio toggle -->
      <button
        type="button"
        class="ember-audio-btn"
        id="audioBtn"
        aria-label="Attiva audio Ember"
        title="Audio OFF — clicca per attivare"
      >
        <!-- muted icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>

      <!-- Send button -->
      <button
        type="button"
        class="ember-send-btn"
        id="sendBtn"
        disabled
        aria-label="Invia messaggio"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Hint footer -->
  <div class="ember-hint">
    <kbd>Invio</kbd> per inviare &nbsp;·&nbsp; <kbd>Shift+Invio</kbd> per andare a capo
    <span class="ember-audio-hint" id="audioHint" style="display:none"> · 🔊 Audio attivo</span>
  </div>
</div>

<!-- Audio toast notification -->
<div class="audio-toast" id="audioToast">
  <span id="toastIcon">🔊</span>
  <span id="toastText">Audio attivato</span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let audioEnabled = false;
let isLoading = false;
let toastTimer = null;

const synth = window.speechSynthesis;

// ── Elements ────────────────────────────────────────────────────────────────
const wrapper    = document.getElementById('promptWrapper');
const textarea   = document.getElementById('promptInput');
const sendBtn    = document.getElementById('sendBtn');
const audioBtn   = document.getElementById('audioBtn');
const audioHint  = document.getElementById('audioHint');
const liveText   = document.getElementById('liveText');
const statusDot  = document.getElementById('statusDot');
const chat       = document.getElementById('chat');
const audioToast = document.getElementById('audioToast');
const toastText  = document.getElementById('toastText');
const toastIcon  = document.getElementById('toastIcon');

// ── TTS ─────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!audioEnabled || !synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'it-IT';
  utt.rate = 1.05;
  utt.pitch = 1.1;
  const voices = synth.getVoices();
  const best = voices.find(v => v.lang === 'it-IT' && v.name.toLowerCase().includes('alice'))
            || voices.find(v => v.lang === 'it-IT')
            || voices[0];
  if (best) utt.voice = best;
  synth.speak(utt);
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(icon, text) {
  toastIcon.textContent = icon;
  toastText.textContent = text;
  audioToast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => audioToast.classList.remove('show'), 2200);
}

// ── Audio toggle ─────────────────────────────────────────────────────────────
audioBtn.addEventListener('click', () => {
  audioEnabled = !audioEnabled;
  if (!audioEnabled) synth?.cancel();

  audioBtn.classList.toggle('active', audioEnabled);
  audioBtn.setAttribute('aria-label', audioEnabled ? 'Disattiva audio Ember' : 'Attiva audio Ember');
  audioBtn.title = audioEnabled ? 'Audio ON — clicca per silenziare' : 'Audio OFF — clicca per attivare';
  audioHint.style.display = audioEnabled ? '' : 'none';

  // Swap icon
  audioBtn.innerHTML = audioEnabled
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
       </svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
       </svg>`;

  showToast(audioEnabled ? '🔊' : '🔇', audioEnabled ? 'Audio attivato' : 'Audio silenziato');
  if (audioEnabled) speak('Audio Ember attivato.');
});

// ── Live text visualizer ──────────────────────────────────────────────────────
function renderLiveText(text) {
  liveText.innerHTML = '';
  if (!text) return;

  text.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'ember-char';
    span.style.animationDelay = `${Math.min(i * 8, 250)}ms`;
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    liveText.appendChild(span);
  });

  const cursor = document.createElement('span');
  cursor.className = 'ember-cursor';
  cursor.textContent = '|';
  liveText.appendChild(cursor);
}

// ── Input events ──────────────────────────────────────────────────────────────
textarea.addEventListener('input', () => {
  // Auto resize
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
  // Live text
  renderLiveText(textarea.value);
  // Send btn
  sendBtn.disabled = !textarea.value.trim() || isLoading;
});

textarea.addEventListener('focus', () => wrapper.classList.add('focused'));
textarea.addEventListener('blur',  () => wrapper.classList.remove('focused'));

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) doSend();
  }
});

// ── Fake bot responses (demo) ─────────────────────────────────────────────────
const fakeResponses = [
  'Ho capito! Sto analizzando il tuo workspace...',
  'Ottima domanda! Ecco la mia analisi del codice.',
  'Trovato! Il problema è nella configurazione del backend.',
  'Ho letto i file. Posso aiutarti con questo refactor.',
  'Perfetto, procedo con la modifica richiesta.',
];
let responseIdx = 0;

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  if (type === 'bot') {
    div.innerHTML = `<span class="ember-avatar">🔥 Ember</span>${text}`;
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setLoading(val) {
  isLoading = val;
  wrapper.classList.toggle('loading', val);
  textarea.disabled = val;
  sendBtn.disabled = val;

  if (val) {
    statusDot.innerHTML = `
      <div class="ember-thinking-dots">
        <span></span><span></span><span></span>
      </div>`;
    textarea.placeholder = 'Ember sta elaborando…';
  } else {
    statusDot.innerHTML = `<span class="ember-dot-live"></span>`;
    textarea.placeholder = 'Chiedi a Ember…';
    textarea.disabled = false;
    sendBtn.disabled = !textarea.value.trim();
  }
}

function doSend() {
  const msg = textarea.value.trim();
  if (!msg) return;

  addMessage(msg, 'user');
  textarea.value = '';
  textarea.style.height = 'auto';
  liveText.innerHTML = '';
  setLoading(true);

  // Simula risposta bot dopo 1.2–2s
  const delay = 1200 + Math.random() * 800;
  setTimeout(() => {
    const resp = fakeResponses[responseIdx % fakeResponses.length];
    responseIdx++;
    setLoading(false);
    addMessage(resp, 'bot');
    speak(resp); // TTS se attivo
  }, delay);
}

sendBtn.addEventListener('click', doSend);
</script>
</body>
</html>
